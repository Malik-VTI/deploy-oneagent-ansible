# Ansible configuration — Dynatrace OneAgent deployment
# Docs: https://docs.dynatrace.com/docs/ingest-from/dynatrace-oneagent/deployment-orchestration/ansible

[defaults]
inventory           = inventory/hosts.yml
collections_path    = collections
stdout_callback     = yaml
force_color         = True
interpreter_python  = auto_silent
retry_files_enabled = False
# Lab/POC convenience. Set to True in production and manage known_hosts.
host_key_checking   = False
# Uncomment to avoid typing the vault password each run (keep the file OUT of git!):
# vault_password_file = .vault_pass

[privilege_escalation]
# Global default is off; Linux hosts turn this on via group_vars/linux.yml.
become        = False
become_method = sudo
become_user   = root

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s
