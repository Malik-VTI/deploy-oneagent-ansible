---
# Inventory of hosts that will receive the Dynatrace OneAgent.
#
# Each host belongs to TWO kinds of groups:
#   1. OS group    (linux / windows)       -> connection settings, see group_vars/
#   2. Mode group  (fullstack / infra_only) -> OneAgent deployment mode
#
# A host can be in several groups at once. List every host under ONE OS
# group AND ONE mode group. Define `ansible_host` only once (under the OS
# group); in the mode group just repeat the host name to add membership.
all:
  children:

    # ---- OS groups: control HOW Ansible connects ---------------------
    linux:
      hosts:
        linux-host-01:
          ansible_host: 10.100.33.102
        # linux-host-02:
        #   ansible_host: 10.0.0.12

    windows:
      hosts:
        windows-host-01:
          ansible_host: 10.100.33.179

    # ---- Mode groups: control full-stack vs infra-only ---------------
    # Full-stack is the default (set in group_vars/all/vars.yml).
    # Putting a host in `infra_only` flips it to infra-only via
    # group_vars/infra_only.yml. Each host goes in exactly ONE mode group.
    fullstack:
      hosts:
        linux-host-01:

    infra_only:
      hosts:
        # linux-host-02:
        windows-host-01:
